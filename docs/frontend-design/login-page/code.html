<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>CleanOps Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style data-purpose="custom-styles">
    body {
      font-family: 'Inter', sans-serif;
    }
    .bg-custom-green {
      background-color: #03472c;
    }
    .text-custom-green {
      color: #03472c;
    }
    .border-custom-green {
      border-color: #e5e7eb;
    }
    .bg-input-gray {
      background-color: #f3f4f6;
    }
    .gradient-overlay {
      background: linear-gradient(to top, rgba(15, 23, 42, 0.9) 0%, rgba(15, 23, 42, 0) 50%);
    }
  </style>
<!-- Tailwind config for custom colors if needed -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-green': '#03472c',
            'brand-light-green': '#dcfce7',
            'brand-teal': '#5eead4',
          }
        }
      }
    }
  </script>
</head>
<body class="h-screen w-full flex bg-white overflow-hidden">
<!-- BEGIN: Left Split (Image Panel) -->
<section class="w-1/2 h-full relative flex flex-col justify-end">
<!-- Background Image -->
<img alt="Facility background" class="absolute inset-0 w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0ug7vagAC9zq1nx41dauhHtEmQHJflbPsS0_k0N0c14RvfhVgUkmi-3l9IhktoDSKILsk7m9jbzz9jc0fNW96TRdq2i_MlyaH2vWJH2MWmfuHGHu29RTvHUIDpZQ0OKcllgh0-Y6CpjPnG2bKrY2DpV3S_j7HQkI6oXeWcn3d9omr-bpkt3h6zJPeXTcx_2zprQYFHVp5VpDm0JKh_MJ5GPIW0WU1NwPELnPiBl1mcro83NKhRVoq8IG7cTtmLCvNP4FkKOmrKuHUw">
<!-- Gradient Overlay for text readability -->
<div class="absolute inset-0 gradient-overlay"></div>
<!-- Text Content -->
<div class="relative z-10 p-12 text-white max-w-lg mb-8">
<h1 class="text-4xl font-bold mb-4 leading-tight"><br></h1>
<p class="text-sm text-gray-200 leading-relaxed font-medium"><br></p>
</div>
</section>
<!-- END: Left Split (Image Panel) -->
<!-- BEGIN: Right Split (Login Form) -->
<section class="w-1/2 h-full flex flex-col justify-center items-center bg-white p-8 overflow-y-auto">
<div class="w-full max-w-md">
<!-- Header -->
<div class="mb-10 text-center sm:text-left">
<h2 class="text-3xl font-bold text-gray-900 mb-2">Welcome Back</h2>
<p class="text-gray-500">Access your CleanOps console.</p>
</div>
<!-- Quick Access Demo Roles -->
<div class="mb-8">
<p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Quick access for demo</p>
<div class="flex gap-4">
<!-- John Doe Card -->
<button class="flex-1 flex items-center p-3 rounded-lg border border-green-200 bg-green-50 hover:bg-green-100 transition-colors text-left group">
<div class="h-10 w-10 rounded-full bg-brand-green text-white flex items-center justify-center font-bold text-sm mr-3">
              JD
            </div>
<div>
<p class="text-sm font-semibold text-gray-900">John Doe</p>
<p class="text-xs text-gray-500 mb-1">Facility Mgr</p>
<span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-medium bg-brand-teal text-teal-900">
<span class="w-1.5 h-1.5 rounded-full bg-teal-900 mr-1"></span> Admin Role
              </span>
</div>
</button>
<!-- Anna Smith Card -->
<button class="flex-1 flex items-center p-3 rounded-lg border border-gray-200 bg-gray-50 hover:bg-gray-100 transition-colors text-left group">
<div class="h-10 w-10 rounded-full bg-brand-teal text-teal-900 flex items-center justify-center font-bold text-sm mr-3">
              AS
            </div>
<div>
<p class="text-sm font-semibold text-gray-900">Anna Smith</p>
<p class="text-xs text-gray-500 mb-1">Technician</p>
<span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-medium bg-gray-200 text-gray-700">
                Standard Role
              </span>
</div>
</button>
</div>
</div>
<!-- Divider -->
<div class="relative mb-8">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-gray-200"></div>
</div>
<div class="relative flex justify-center">
<span class="px-3 bg-white text-[10px] font-semibold text-gray-400 uppercase tracking-wider">
            Or continue with email
          </span>
</div>
</div>
<!-- Login Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Work Email Field -->
<div>
<label class="block text-sm font-semibold text-gray-700 mb-1" for="email">Work Email</label>
<div class="relative mt-1 rounded-md shadow-sm">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<!-- Mail Icon -->
<svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="block w-full pl-10 pr-3 py-3 border-gray-200 bg-gray-50 rounded-lg focus:ring-brand-green focus:border-brand-green sm:text-sm text-gray-900 placeholder-gray-400" id="email" name="email" placeholder="name@veridian.com" type="email">
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-1">
<label class="block text-sm font-semibold text-gray-700" for="password">Password</label>
<a class="text-xs font-semibold text-brand-green hover:text-green-800" href="#">Forgot password?</a>
</div>
<div class="relative mt-1 rounded-md shadow-sm">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<!-- Lock Icon -->
<svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="block w-full pl-10 pr-10 py-3 border-gray-200 bg-gray-50 rounded-lg focus:ring-brand-green focus:border-brand-green sm:text-sm text-gray-900 placeholder-gray-400" id="password" name="password" placeholder="••••••••" type="password">
<div class="absolute inset-y-0 right-0 pr-3 flex items-center">
<!-- Eye Off Icon -->
<button class="text-gray-400 hover:text-gray-500 focus:outline-none" type="button">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</div>
</div>
<!-- Remember Me Checkbox -->
<div class="flex items-center">
<input class="h-4 w-4 text-brand-green focus:ring-brand-green border-gray-300 rounded text-brand-green" id="remember-me" name="remember-me" type="checkbox">
<label class="ml-2 block text-xs text-gray-600 font-medium" for="remember-me">
            Remember my device for 30 days
          </label>
</div>
<!-- Submit Button -->
<div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-brand-green hover:bg-green-900 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-green transition-colors" type="submit">
            Secure login
          </button>
</div>
</form>
</div>
</section>
<!-- END: Right Split (Login Form) -->


</body></html>
