name: build-images

on:
  push:
    branches: [master]
  workflow_dispatch:

# Two pushes to master in quick succession should both build, so no
# cancel-in-progress here — the latest commit's images must always
# end up tagged `latest`.
concurrency:
  group: build-images-${{ github.ref }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - image: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute lowercase repo slug
        id: slug
        # GHCR accepts lowercase image names only; ${{ github.repository }}
        # is owner/repo and may contain uppercase letters in either part.
        # Normalising once here means the rest of the job uses one
        # consistent identifier.
        run: echo "slug=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.slug.outputs.slug }}-${{ matrix.image }}:latest
            ghcr.io/${{ steps.slug.outputs.slug }}-${{ matrix.image }}:${{ github.sha }}
          # GitHub Actions cache backend keeps Buildx layer cache scoped
          # per-branch (mode=max captures multi-stage intermediate
          # stages, which the frontend image needs for the node build
          # stage to not redo `npm ci` on every push).
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
