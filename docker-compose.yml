services:
  db:
    image: postgres:16-alpine
    container_name: cleaning_ticket_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: cleaning_ticket_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: cleaning_ticket_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./backend
    container_name: cleaning_ticket_worker
    command: celery -A config worker -l info
    user: app
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

  beat:
    build:
      context: ./backend
    container_name: cleaning_ticket_beat
    command: celery -A config beat -l info --schedule /tmp/celerybeat-schedule
    user: app
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
