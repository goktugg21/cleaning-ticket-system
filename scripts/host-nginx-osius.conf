# Host-level nginx for crmticket — front door on port 80.
#
# Topology after this change:
#   NPM / browser -> HOST nginx :80 -> docker frontend (127.0.0.1:8080) -> backend:8000
#
# Purpose: /healthz is answered DIRECTLY by the host (not docker), so the
# server liveness check returns 200 independently of the app container —
# e.g. it stays green during a frontend container recreate/rebuild.
#
# Install: see scripts/ runbook / the chat instructions. Deployed to
# /etc/nginx/sites-available/osius.conf and symlinked into sites-enabled,
# replacing the default site.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    server_tokens off;
    client_max_body_size 12M;

    # Host-level liveness — served directly, no docker round-trip.
    # Returns 200 even if the app container is busy or recreating.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "OK\n";
    }

    # Everything else -> docker frontend container, bound to localhost:8080.
    # The container's own nginx still handles /api, /static, /django-admin
    # and the SPA fallback exactly as before.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Preserve the scheme NPM already set upstream (https); pass it
        # through so Django's is_secure()/CSRF stay correct.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_read_timeout 300s;
    }
}
