name: cleaning-ticket-prod

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    logging: *default-logging
    image: postgres:16-alpine
    container_name: cleaning_ticket_prod_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    logging: *default-logging
    image: redis:7-alpine
    container_name: cleaning_ticket_prod_redis
    restart: unless-stopped
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    logging: *default-logging
    build:
      context: ./backend
    container_name: cleaning_ticket_prod_backend
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers $${GUNICORN_WORKERS:-3} --timeout $${GUNICORN_TIMEOUT:-120}"
    env_file:
      - .env
    volumes:
      - backend_media_prod:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Liveness only — readiness is a load-balancer concern.
      # We use a TCP socket probe (not an HTTP GET against
      # /health/live) because the production-settings validator in
      # backend/config/security.py forbids `localhost` / `127.0.0.1`
      # from appearing in DJANGO_ALLOWED_HOSTS when DEBUG=False, so
      # an HTTP probe with `Host: localhost:8000` would 400 on the
      # ALLOWED_HOSTS gate. The TCP probe just confirms gunicorn is
      # accepting connections; the upstream NPM/load-balancer is
      # responsible for the readiness signal that exercises Django.
      # See docs/deployment.md for the full rationale.
      test: ["CMD-SHELL", "python -c \"import socket,sys; s=socket.create_connection(('localhost',8000),2); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    logging: *default-logging
    build:
      context: ./backend
    container_name: cleaning_ticket_prod_worker
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=2
    user: app
    env_file:
      - .env
    volumes:
      - backend_media_prod:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    logging: *default-logging
    build:
      context: ./backend
    container_name: cleaning_ticket_prod_beat
    restart: unless-stopped
    command: celery -A config beat -l info --schedule /tmp/celerybeat-schedule
    user: app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    logging: *default-logging
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: cleaning_ticket_prod_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data_prod:
  redis_data_prod:
  backend_media_prod:
