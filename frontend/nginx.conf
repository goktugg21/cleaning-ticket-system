# Forwarded scheme resolution for the chain:
#   Browser HTTPS -> NGINX Proxy Manager -> this nginx -> backend
#
# NPM forwards over HTTP to this container, so $scheme is ALWAYS "http"
# inside this server block — using it directly for X-Forwarded-Proto
# would tell Django every request is HTTP even when the browser used
# HTTPS, breaking request.is_secure() / secure cookies / CSRF.
#
# Prefer the X-Forwarded-Proto NPM already set; fall back to $scheme
# only if the header is missing (direct hit, debug, etc.). This trusts
# NPM as the only legitimate caller, which matches the deployment
# topology — only the frontend container's port is exposed, and NPM
# is the only thing that should ever reach it.
map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    ~.+ $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name _;

    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 12M;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # $proxy_add_x_forwarded_for appends $remote_addr to whatever
        # XFF arrived from NPM, so Django sees the full chain. The
        # audit middleware reads the FIRST hop, which is the original
        # client IP that NPM recorded.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_read_timeout 300s;
    }

    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_read_timeout 300s;
    }

    location /static/ {
        proxy_pass http://backend:8000/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    # Sprint 11 — explicit /health/ proxy.
    #
    # Django registers the liveness/readiness endpoints at /health/live
    # and /health/ready (no /api/ prefix), so the catch-all SPA fallback
    # below MUST NOT swallow them — without this block, a public smoke
    # against /health/live would return the SPA shell with HTTP 200,
    # silently masking a real problem.
    #
    # The internal docker-compose backend healthcheck still uses a TCP
    # socket probe (see docker-compose.prod.yml) and is unaffected; this
    # location exists for the operator-facing public smoke described in
    # docs/production-smoke-test.md §2-3.
    location /health/ {
        proxy_pass http://backend:8000/health/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_read_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
